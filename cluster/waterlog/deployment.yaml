apiVersion: apps/v1
kind: Deployment
metadata:
  name: waterlog
  namespace: waterlog
  labels:
    app: waterlog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waterlog
  template:
    metadata:
      labels:
        app: waterlog
    spec:
      containers:
        - name: waterlog
          image: ghcr.io/needleinajaystack/waterlog:main@sha256:784e1f172a16d6ac5d68e17aa181b4e4b3039b5075640970a2dc3d2ed2a6d828
          ports:
            - name: waterlog
              containerPort: 8080
          env:
            - name: WATERLOG_DB_POSTGRES_HOST
              value: cluster
            - name: WATERLOG_DB_POSTGRES_NAME
              value: waterlog
            - name: WATERLOG_DB_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cluster
                  key: superuser-username
            - name: WATERLOG_DB_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster
                  key: superuser-password
      imagePullSecrets:
        - name: ghcr
