apiVersion: stackgres.io/v1
kind: SGCluster
metadata:
  namespace: waterlog
  name: cluster
spec:
  postgres:
    version: '18'
    extensions:
      - name: uuid-ossp
        version: "1.1"
  instances: 1
  pods:
    persistentVolume:
      size: '10Gi'
  configurations:
    sgPostgresConfig: postgres-config
    observability:
      prometheusAutobind: true
