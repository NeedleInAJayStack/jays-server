apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
  namespace: zeroclaw
data:
  config.toml: |-
    default_provider = "anthropic"
    default_model = "anthropic/claude-sonnet-4-6"



    {
      "agents": {
        "defaults": {
          "model": {
            "primary": "anthropic/claude-sonnet-4-20250514"
          }
        }
      },
      "channels": {
        "telegram": {
          "allowFrom": [
            "6501578011"
          ],
          "dmPolicy": "allowlist",
          "enabled": true,
          "groups": {
            "*": {
              "requireMention": true
            }
          }
        }
      },
      "gateway": {
        "auth": {
          "mode": "token"
        },
        "bind": "lan",
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:18789",
            "http://127.0.0.1:18789"
          ]
        }
      },
    }
