apiVersion: stackgres.io/v1
kind: SGCluster
metadata:
  namespace: rallly
  name: cluster
spec:
  postgres:
    version: '14'
    extensions:
      - name: citext
      - name: pgcrypto
  instances: 1
  pods:
    persistentVolume:
      size: '10Gi'
  configurations:
    sgPostgresConfig: postgres-config
    observability:
      prometheusAutobind: true
