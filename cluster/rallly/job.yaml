# Job to convert the database password secret into a full postgres:// URL
apiVersion: batch/v1
kind: Job
metadata:
  name: create-db-url-secret
  namespace: rallly
spec:
  template:
    spec:
      serviceAccountName: secret-creator
      restartPolicy: OnFailure
      containers:
        - name: create-secret
          image: bitnami/kubectl:latest
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cluster
                  key: superuser-username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: cluster
                  key: superuser-password
            - name: DB_HOST
              value: "cluster"
            - name: DB_NAME
              value: "postgres"
          command:
            - /bin/sh
            - -c
            - |
              kubectl create secret generic db-url \
                --from-literal=url="postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:5432/${DB_NAME}" \
                --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-creator
  namespace: rallly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-creator
  namespace: rallly
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-creator
  namespace: rallly
subjects:
  - kind: ServiceAccount
    name: secret-creator
    namespace: rallly
roleRef:
  kind: Role
  name: secret-creator
  apiGroup: rbac.authorization.k8s.io
